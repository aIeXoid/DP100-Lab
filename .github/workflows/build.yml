name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DP100-Lab-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libusb-1.0-0-dev libudev-dev

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri build --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DP100-Lab-linux
          path: src-tauri/target/release/dp100-app
