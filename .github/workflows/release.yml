name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DP100-Lab-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libusb-1.0-0-dev libudev-dev

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri build --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Package Linux binary
        run: |
          mkdir -p DP100-Lab-linux-x86_64
          cp src-tauri/target/release/dp100-app DP100-Lab-linux-x86_64/
          tar -czf DP100-Lab_linux_x86_64.tar.gz DP100-Lab-linux-x86_64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DP100-Lab-linux
          path: DP100-Lab_linux_x86_64.tar.gz

  publish:
    needs: [release-macos, release-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            DP100-Lab-macos/*.dmg
            DP100-Lab-linux/*.tar.gz
